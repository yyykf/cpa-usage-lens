# git-cliff configuration — https://git-cliff.org/docs/configuration
# Generates an English CHANGELOG / release notes from Conventional Commits.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.
Generated by [git-cliff](https://git-cliff.org) from Conventional Commits.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
          {% if commit.breaking %}[**breaking**] {% endif %}\
          {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
    # drop a trailing "[#AI]" marker if it ever lands in the subject line
    { pattern = '\s*\[#AI\]\s*', replace = "" },
    # wrap "@word" in backticks so GitHub doesn't render it as a user mention (e.g. @theme)
    { pattern = '@([a-zA-Z0-9_-]+)', replace = "`@${1}`" },
]
# HTML-comment prefixes control group order; `striptags` in the template removes them.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^docs?", group = "<!-- 2 -->Documentation" },
    { message = "^perf", group = "<!-- 3 -->Performance" },
    { message = "^refactor", group = "<!-- 4 -->Refactor" },
    { message = "^style", group = "<!-- 5 -->Styling" },
    { message = "^test", group = "<!-- 6 -->Testing" },
    { message = "^ci", group = "<!-- 7 -->CI/CD" },
    { message = "^build", group = "<!-- 8 -->Build" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore", group = "<!-- 9 -->Miscellaneous" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
