# CPA Usage Lens — production compose using pre-built images from GHCR (no local build).
#
#   1. cp .env.example .env          # then fill in your values
#   2. CUL_VERSION=<latest-release-tag> docker compose -f docker-compose.prod.yml up -d
#      Use the latest release tag from https://github.com/yyykf/cpa-usage-lens/releases
#
# Images are published by .github/workflows/release.yml on every v* tag.
# Service names must stay "backend"/"frontend" — the frontend nginx proxies /api to "backend".
services:
  backend:
    image: ghcr.io/yyykf/cpa-usage-lens-backend:${CUL_VERSION:-latest}
    env_file: .env
    restart: unless-stopped
    volumes:
      - backend-buffer:/data/buffer # disk buffer persistence (survives collector restart)

  frontend:
    image: ghcr.io/yyykf/cpa-usage-lens-frontend:${CUL_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80" # browse http://<server-ip>:8088

volumes:
  backend-buffer:
