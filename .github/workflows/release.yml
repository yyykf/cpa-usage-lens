# Release — triggered by pushing a version tag (e.g. v0.1.0), NOT by merging to main.
# Builds the backend + frontend images, pushes them to GHCR, then creates a GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

# GITHUB_TOKEN needs: packages:write (push to GHCR) + contents:write (create the Release).
permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Build & push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags from the git tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cpa-usage-lens-${{ matrix.name }}
          # git tag v1.2.3  ->  image tags  v1.2.3 , v1.2 , and latest
          # (latest only for stable tags; a tag with a hyphen like v0.1.0-alpha is treated as pre-release)
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff against the previous tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
